<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT Current State</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 15px;
        }
        
        h1 {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        h1 .icon {
            font-size: 24px;
        }
        
        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-controls a {
            color: #3498db;
            text-decoration: none;
            font-size: 14px;
        }
        
        .header-controls a:hover {
            text-decoration: underline;
        }
        
        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 12px;
        }
        
        .connection-status.connected {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }
        
        .connection-status.disconnected {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }
        
        .connection-status.connecting {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
            border: 1px solid rgba(241, 196, 15, 0.3);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .connected .status-dot {
            background: #2ecc71;
            box-shadow: 0 0 10px #2ecc71;
        }
        
        .disconnected .status-dot {
            background: #e74c3c;
        }
        
        .connecting .status-dot {
            background: #f1c40f;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .compact-header {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-item .label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
        }
        
        .status-item .value {
            font-size: 13px;
            font-weight: 600;
            color: #3498db;
        }
        
        .status-item .value.connected {
            color: #2ecc71;
        }
        
        .status-item .value.disconnected {
            color: #e74c3c;
        }
        
        .status-item .value.mono {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 12px;
            color: #aaa;
        }
        
        .divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .stats-inline {
            display: flex;
            gap: 12px;
            margin-left: auto;
        }
        
        .stat-inline {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .stat-inline .num {
            font-size: 16px;
            font-weight: 600;
            color: #3498db;
        }
        
        .stat-inline .lbl {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .values-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .value-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s ease;
        }
        
        .value-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(52, 152, 219, 0.3);
        }
        
        .value-card.updated {
            animation: highlight 1s ease-out;
        }
        
        @keyframes highlight {
            0% { background: rgba(46, 204, 113, 0.3); }
            100% { background: rgba(255, 255, 255, 0.05); }
        }
        
        .value-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        
        .value-topic {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 12px;
            color: #3498db;
            word-break: break-all;
            flex: 1;
        }
        
        .value-timestamp {
            font-size: 11px;
            color: #666;
            white-space: nowrap;
            margin-left: 10px;
        }
        
        .value-content {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 12px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 12px;
            color: #98c379;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .value-content::-webkit-scrollbar {
            width: 6px;
        }
        
        .value-content::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        
        .value-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
        }
        
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        
        .empty-state p {
            font-size: 14px;
        }
        
        .filter-section {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .filter-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            flex: 1;
            min-width: 200px;
        }
        
        .filter-input:focus {
            border-color: #3498db;
        }
        
        .filter-buttons {
            display: flex;
            gap: 8px;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .filter-btn.active {
            background: rgba(52, 152, 219, 0.3);
            border-color: #3498db;
            color: #3498db;
        }
        
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #2ecc71;
            background: rgba(46, 204, 113, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
        }
        
        .live-indicator .dot {
            width: 6px;
            height: 6px;
            background: #2ecc71;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .compact-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .stats-inline {
                margin-left: 0;
                margin-top: 10px;
            }
            
            .values-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <span class="icon">📊</span>
                MQTT Current State
            </h1>
            <div class="header-controls">
                <a href="mqttmonitor.html">📨 Message Monitor</a>
                <a href="index.html">🏠 Home</a>
                <div id="wsConnectionStatus" class="connection-status disconnected">
                    <span class="status-dot"></span>
                    <span id="wsStatusText">Disconnected</span>
                </div>
            </div>
        </header>
        
        <!-- Status Bar -->
        <div class="compact-header">
            <div class="status-item">
                <span class="label">MQTT</span>
                <span id="mqttStatus" class="value disconnected">Disconnected</span>
            </div>
            <div class="divider"></div>
            <div class="status-item">
                <span class="label">Broker</span>
                <span id="brokerUrl" class="value mono">-</span>
            </div>
            <div class="divider"></div>
            <div class="status-item">
                <span class="label">Base Topic</span>
                <span id="baseTopic" class="value mono">-</span>
            </div>
            <div class="stats-inline">
                <div class="stat-inline">
                    <span id="valueCount" class="num">0</span>
                    <span class="lbl">values</span>
                </div>
                <span class="live-indicator">
                    <span class="dot"></span>
                    LIVE
                </span>
            </div>
        </div>
        
        <!-- Filter Section -->
        <div class="filter-section">
            <input type="text" id="filterInput" class="filter-input" placeholder="Filter by topic...">
            <div class="filter-buttons">
                <button class="filter-btn" data-filter="all">All</button>
                <button class="filter-btn active" data-filter="state">State Topics</button>
                <button class="filter-btn" data-filter="config">Config Topics</button>
            </div>
        </div>
        
        <!-- State Values Section -->
        <div class="section-title">📊 Current MQTT Values</div>
        <div id="valuesGrid" class="values-grid">
            <div class="empty-state">
                <div class="icon">📭</div>
                <p>No MQTT values yet. Waiting for MQTT activity...</p>
                <p style="margin-top: 10px; font-size: 12px;">Values will appear here as they are published.</p>
            </div>
        </div>
    </div>

    <script>
        // State
        let ws = null;
        let mqttValues = new Map(); // Map of topic -> { payload, timestamp }
        let mqttStats = null;
        let currentFilter = 'state';
        let textFilter = '';
        
        // DOM Elements
        const wsConnectionStatus = document.getElementById('wsConnectionStatus');
        const wsStatusText = document.getElementById('wsStatusText');
        const mqttStatusEl = document.getElementById('mqttStatus');
        const brokerUrlEl = document.getElementById('brokerUrl');
        const baseTopicEl = document.getElementById('baseTopic');
        const valueCountEl = document.getElementById('valueCount');
        const valuesGrid = document.getElementById('valuesGrid');
        const filterInput = document.getElementById('filterInput');
        const filterButtons = document.querySelectorAll('.filter-btn');
        
        // Connect to WebSocket
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/messagebus`;
            
            updateWsConnectionStatus('connecting');
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                updateWsConnectionStatus('connected');
                setTimeout(() => {
                    subscribeToMqttEvents();
                }, 100);
            };
            
            ws.onclose = () => {
                updateWsConnectionStatus('disconnected');
                setTimeout(connect, 3000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
            
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                } catch (error) {
                    console.error('Failed to parse message:', error);
                }
            };
        }
        
        function updateWsConnectionStatus(status) {
            wsConnectionStatus.className = 'connection-status ' + status;
            wsStatusText.textContent = status.charAt(0).toUpperCase() + status.slice(1);
        }
        
        function subscribeToMqttEvents() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            
            console.log('[MQTT State] Subscribing to MQTT events...');
            
            // Subscribe to MQTT events
            const mqttEvents = [
                'mqtt:status',
                'mqtt:stats',
                'mqtt:valuechange',   // New event for value changes
                'mqtt:published'      // Also catch published events to capture values
            ];
            
            for (const event of mqttEvents) {
                console.log(`[MQTT State] Subscribing to: ${event}`);
                ws.send(JSON.stringify({
                    action: 'subscribe',
                    deviceId: 0,
                    name: event
                }));
            }
            
            // Get current stats
            console.log('[MQTT State] Requesting mqtt:stats...');
            ws.send(JSON.stringify({
                action: 'getValue',
                deviceId: 0,
                name: 'mqtt:stats'
            }));
            
            console.log('[MQTT State] Requesting mqtt:status...');
            ws.send(JSON.stringify({
                action: 'getValue',
                deviceId: 0,
                name: 'mqtt:status'
            }));
            
            // Get last stored values (populated on page load)
            console.log('[MQTT State] Requesting mqtt:lastvalues...');
            ws.send(JSON.stringify({
                action: 'getValue',
                deviceId: 0,
                name: 'mqtt:lastvalues'
            }));
        }
        
        function handleMessage(data) {
            switch (data.type) {
                case 'welcome':
                    console.log('Connected to MessageBus', data);
                    break;
                    
                case 'message':
                    handleMqttEvent(data);
                    break;
                    
                case 'getValueResult':
                    console.log(`[MQTT State] getValueResult for ${data.name}: success=${data.success}, exists=${data.exists}`, data.value);
                    if (data.success && data.exists) {
                        if (data.name === 'mqtt:stats') {
                            updateMqttStats(data.value);
                        } else if (data.name === 'mqtt:status') {
                            updateMqttStatus(data.value);
                        } else if (data.name === 'mqtt:lastvalues') {
                            // Load all stored values on page load
                            console.log('[MQTT State] Loading last values from DataBroker:', data.value);
                            loadLastValues(data.value);
                        }
                    } else {
                        console.log(`[MQTT State] getValue for ${data.name} - not found or failed`);
                    }
                    break;
                    
                case 'subscribeResult':
                    console.log('Subscribed to:', data.name);
                    break;
                    
                case 'error':
                    console.error('MessageBus error:', data.error);
                    break;
            }
        }
        
        function handleMqttEvent(data) {
            const eventName = data.name;
            const eventData = data.data;
            
            console.log(`[MQTT State] Received event: ${eventName}`, eventData);
            
            switch (eventName) {
                case 'mqtt:status':
                    updateMqttStatus(eventData);
                    break;
                    
                case 'mqtt:stats':
                    updateMqttStats(eventData);
                    break;
                    
                case 'mqtt:valuechange':
                case 'mqtt:published':
                    // Update the value for this topic
                    if (eventData.topic && eventData.payload !== undefined) {
                        console.log(`[MQTT State] Updating value for topic: ${eventData.topic}`);
                        updateValue(eventData.topic, eventData.payload, eventData.timestamp);
                    }
                    break;
            }
        }
        
        function updateMqttStatus(statusData) {
            if (!statusData) return;
            
            const status = statusData.status || 'unknown';
            mqttStatusEl.textContent = status.charAt(0).toUpperCase() + status.slice(1);
            mqttStatusEl.className = 'value ' + status;
            
            if (statusData.brokerUrl) {
                brokerUrlEl.textContent = statusData.brokerUrl;
            }
            
            if (statusData.baseTopic) {
                baseTopicEl.textContent = statusData.baseTopic;
            }
        }
        
        function updateMqttStats(stats) {
            if (!stats) return;
            mqttStats = stats;
            
            const status = stats.connected ? 'connected' : 'disconnected';
            mqttStatusEl.textContent = status.charAt(0).toUpperCase() + status.slice(1);
            mqttStatusEl.className = 'value ' + status;
            
            if (stats.brokerUrl) {
                brokerUrlEl.textContent = stats.brokerUrl;
            }
            if (stats.baseTopic) {
                baseTopicEl.textContent = stats.baseTopic;
            }
        }
        
        function loadLastValues(values) {
            console.log('[MQTT State] loadLastValues called with:', values);
            
            if (!values || typeof values !== 'object') {
                console.log('[MQTT State] loadLastValues: Invalid or empty values object');
                return;
            }
            
            const entries = Object.entries(values);
            console.log(`[MQTT State] Loading ${entries.length} values from storage`);
            
            // Load all stored values
            for (const [topic, data] of entries) {
                console.log(`[MQTT State] Loading topic: ${topic}`, data);
                mqttValues.set(topic, {
                    payload: data.payload,
                    timestamp: data.timestamp
                });
            }
            
            valueCountEl.textContent = mqttValues.size;
            renderValues();
            console.log(`[MQTT State] Loaded ${mqttValues.size} stored MQTT values total`);
        }
        
        function updateValue(topic, payload, timestamp) {
            const isNewTopic = !mqttValues.has(topic);
            
            mqttValues.set(topic, {
                payload: payload,
                timestamp: timestamp || new Date().toISOString()
            });
            
            valueCountEl.textContent = mqttValues.size;
            
            // Re-render and highlight the updated card
            renderValues(isNewTopic ? null : topic);
        }
        
        function renderValues(highlightTopic = null) {
            // Filter values based on current filters
            let filteredEntries = Array.from(mqttValues.entries());
            
            // Apply text filter
            if (textFilter) {
                const lowerFilter = textFilter.toLowerCase();
                filteredEntries = filteredEntries.filter(([topic]) => 
                    topic.toLowerCase().includes(lowerFilter)
                );
            }
            
            // Apply category filter
            // Config topics: Home Assistant discovery configs (end with /config or start with homeassistant/sensor, homeassistant/switch, etc.)
            // State topics: Actual state values (not discovery configs)
            if (currentFilter === 'state') {
                filteredEntries = filteredEntries.filter(([topic]) => 
                    !topic.includes('/config')
                );
            } else if (currentFilter === 'config') {
                filteredEntries = filteredEntries.filter(([topic]) => 
                    topic.includes('/config')
                );
            }
            
            // Sort by topic
            filteredEntries.sort((a, b) => a[0].localeCompare(b[0]));
            
            if (filteredEntries.length === 0) {
                valuesGrid.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>${mqttValues.size === 0 ? 'No MQTT values yet. Waiting for MQTT activity...' : 'No values match your filter.'}</p>
                    </div>
                `;
                return;
            }
            
            valuesGrid.innerHTML = filteredEntries.map(([topic, data]) => {
                const time = new Date(data.timestamp).toLocaleTimeString();
                const payloadStr = formatPayload(data.payload);
                const isHighlighted = topic === highlightTopic;
                
                return `
                    <div class="value-card${isHighlighted ? ' updated' : ''}" data-topic="${escapeHtml(topic)}">
                        <div class="value-card-header">
                            <div class="value-topic">${escapeHtml(topic)}</div>
                            <div class="value-timestamp">${time}</div>
                        </div>
                        <div class="value-content">${escapeHtml(payloadStr)}</div>
                    </div>
                `;
            }).join('');
        }
        
        function formatPayload(payload) {
            if (payload === null || payload === undefined) return 'null';
            if (typeof payload === 'object') {
                // Filter out verbose/internal fields for cleaner display
                const filteredPayload = filterPayloadFields(payload);
                // Format as key: value pairs without JSON braces
                return formatAsKeyValues(filteredPayload);
            }
            return String(payload);
        }
        
        function formatAsKeyValues(obj) {
            if (typeof obj !== 'object' || obj === null) return String(obj);
            if (Array.isArray(obj)) return JSON.stringify(obj, null, 2);
            
            const entries = Object.entries(obj);
            if (entries.length === 0) return '(empty)';
            
            // Format as key: value pairs
            return entries.map(([key, value]) => {
                let valueStr;
                if (typeof value === 'object' && value !== null) {
                    valueStr = JSON.stringify(value);
                } else if (typeof value === 'string') {
                    valueStr = value;
                } else {
                    valueStr = String(value);
                }
                return `${key}: ${valueStr}`;
            }).join('\n');
        }
        
        function filterPayloadFields(obj) {
            // Fields to exclude from display (verbose/internal)
            const excludeFields = [
                'unique_id',
                'device',
                'value_template',
                'identifiers',
                'manufacturer',
                'model'
            ];
            
            // If it's not an object, return as-is
            if (typeof obj !== 'object' || obj === null) return obj;
            
            // If it's an array, filter each element
            if (Array.isArray(obj)) {
                return obj.map(item => filterPayloadFields(item));
            }
            
            // Filter object fields
            const filtered = {};
            for (const [key, value] of Object.entries(obj)) {
                if (!excludeFields.includes(key)) {
                    filtered[key] = value;
                }
            }
            return filtered;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Event Listeners
        filterInput.addEventListener('input', (e) => {
            textFilter = e.target.value;
            renderValues();
        });
        
        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderValues();
            });
        });
        
        // Initialize
        connect();
    </script>
</body>
</html>
